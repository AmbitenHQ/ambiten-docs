    <path d="M755 256C795 227 848 194 900 218C929 231 942 263 934 294C925 330 904 370 889 410" stroke="url(#gold)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M318 430C282 514 278 616 309 704C348 815 442 916 557 950" stroke="url(#gold)" stroke-width="12" stroke-linecap="round" opacity="0.88"/>
