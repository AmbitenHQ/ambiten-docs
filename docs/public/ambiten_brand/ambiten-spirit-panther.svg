    <path d="M949 352C1010 437 1040 520 1040 612C1040 716 1005 815 942 897"/>
    <path d="M882 973C798 1036 700 1068 600 1068C500 1068 402 1036 318 973"/>
    <path d="M258 897C195 815 160 716 160 612C160 520 190 437 251 352"/>
  </g>

