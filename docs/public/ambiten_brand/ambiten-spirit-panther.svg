<svg width="1200" height="1200" viewBox="0 0 1200 1200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Ambiten Spirit Panther Mark</title>
  <desc id="desc">A simplified vector panther spirit mark with runtime boundary rings and telemetry nodes.</desc>
  <defs>
    <linearGradient id="gold" x1="260" y1="140" x2="940" y2="1030" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFE4A3"/>
      <stop offset="0.42" stop-color="#C99135"/>
      <stop offset="1" stop-color="#F7D37A"/>
    </linearGradient>
    <linearGradient id="goldSoft" x1="350" y1="220" x2="870" y2="980" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF1C2"/>
      <stop offset="1" stop-color="#B47A25"/>
    </linearGradient>
    <linearGradient id="ink" x1="600" y1="210" x2="600" y2="1010" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111B29"/>
      <stop offset="0.52" stop-color="#050B14"/>
      <stop offset="1" stop-color="#02050A"/>
    </linearGradient>
    <filter id="softShadow" x="120" y="120" width="960" height="960" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="26" stdDeviation="28" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
  </defs>

  <rect width="1200" height="1200" fill="#050914"/>

