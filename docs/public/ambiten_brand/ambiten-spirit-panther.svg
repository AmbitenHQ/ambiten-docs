    <path d="M821 520C787 565 750 590 695 594" stroke="url(#gold)" stroke-width="15" stroke-linecap="round"/>
    <path d="M405 423C441 397 494 388 540 407" stroke="url(#gold)" stroke-width="10" stroke-linecap="round" opacity="0.9"/>
