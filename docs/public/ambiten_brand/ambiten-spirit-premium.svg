                0 0 1 0 .2
                0 0 0 .42 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="premiumEyeGlow" x="-50%" y="-50%" width="200%" height="200%">
