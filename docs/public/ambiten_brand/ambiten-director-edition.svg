<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Director Edition by Ambiten</title>
  <desc id="desc">An Ambiten Director edition mark with a panther head, telemetry ring, and runtime signal markers focused on observability.</desc>
  <defs>
    <linearGradient id="directorGold" x1="84" y1="54" x2="424" y2="462" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF0B7"/>
      <stop offset="0.44" stop-color="#D8A846"/>
      <stop offset="1" stop-color="#8B631B"/>
    </linearGradient>
    <linearGradient id="directorBlue" x1="108" y1="124" x2="404" y2="396" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3BD6FF"/>
      <stop offset="0.58" stop-color="#2472FF"/>
      <stop offset="1" stop-color="#1637C2"/>
    </linearGradient>
    <filter id="directorGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 .14
                0 0 0 0 .74
                0 0 0 0 1
                0 0 0 .48 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="88" fill="#020817"/>

  <g filter="url(#directorGlow)">
