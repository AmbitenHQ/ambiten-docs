    <path d="M128 118A202 202 0 0 1 384 118" stroke="url(#directorGold)" stroke-width="10" stroke-linecap="round"/>
    <circle cx="256" cy="72" r="8" fill="url(#directorGold)"/>
    <circle cx="112" cy="168" r="6" fill="url(#directorGold)"/>
    <circle cx="400" cy="168" r="6" fill="url(#directorGold)"/>
    <circle cx="88" cy="292" r="6" fill="url(#directorGold)"/>
    <circle cx="424" cy="292" r="6" fill="url(#directorGold)"/>
  </g>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M256 112
